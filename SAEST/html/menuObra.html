
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obras</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="../css/menuObra.css" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div>
                <div class="sidebar-header">
                    <div class="logo">SAEST</div>
                </div>
                <nav class="sidebar-nav">
                    <ul>
                        <li class="dashboard-link"><i class="ri-home-line"></i> Dashboard</li>
                        <li class="empresas-link"><i class="ri-building-line"></i> Empresas</li>
                        <li class="obras-link active"><i class="ri-building-2-line"></i> Obras</li>
                        <li class="configuracoes-link"><i class="ri-settings-3-line"></i> Configurações</li>
                    </ul>
                </nav>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <div class="name">Usuário</div>
                    <div class="email">usuario@email.com</div>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="main-header">
                <div class="header-content" style="width: 100%; display: flex; justify-content: flex-end; align-items: center;">
                    <div class="header-icons">
                        <i class="ri-notification-3-line"></i>
                    </div>
                </div>
            </header>
            <section class="content-box">
                <div class="content-header">
                    <h2>Obras</h2>
                    <div class="actions">
                        <input type="text" placeholder="Pesquisar por nome" />
                        <select>
                            <option>Ativas</option>
                            <option>Inativas</option>
                        </select>
                        <button class="btn primary" id="cadastrar-obra-btn"><i class="ri-add-line"></i> Cadastrar Obra</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Obra</th>
                            <th>Construtora</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="obra-lista"></tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Modal Editar Obra -->
    <div class="modal-overlay" id="modalEditarObra">
      <div class="modal">
        <button class="modal-close" onclick="fecharModalEditarObra()">&times;</button>
        <h2>Editar Obra</h2>
        <form id="editar-obra-form">
          <div class="form-group">
            <label for="edit-endereco">Endereço da Obra</label>
            <input type="text" id="edit-endereco" required />
          </div>
          <div class="form-group">
            <label for="edit-status">Status</label>
            <select id="edit-status" required>
              <option value="" disabled selected>Selecione</option>
              <option value="Ativo">Ativo</option>
              <option value="Inativo">Inativo</option>
              <option value="Concluído">Concluído</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-data-inicio">Data de Início</label>
            <input type="date" id="edit-data-inicio" required />
          </div>
          <div class="form-group">
            <label for="edit-data-termino">Data de Término</label>
            <input type="date" id="edit-data-termino" />
          </div>
          <div class="form-group">
            <label for="edit-responsavel">Responsável Técnico</label>
            <input type="text" id="edit-responsavel" required />
          </div>
          <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="fecharModalEditarObra()">Cancelar</button>
            <button id="salvar-edicao-obra" type="submit" class="btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="../js/menuObra.js"></script>
    <script type="module" src="../js/redirecionar.js"></script>
</body>
</html>

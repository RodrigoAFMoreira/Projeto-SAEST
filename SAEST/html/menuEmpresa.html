<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empresas</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <link href="../css/menuEmpresa.css" rel="stylesheet" />
</head>

<body>
  <div class="container">
    <aside class="sidebar" id="sidebar">
      <div>
        <div class="sidebar-header">
          <div class="logo">SAEST</div>
        </div>
        <nav class="sidebar-nav">
          <ul>
            <li class="dashboard-link"><i class="ri-home-line"></i> Dashboard</li>
            <li class="empresas-link active"><i class="ri-building-line"></i> Empresas</li>
            <li class="obras-link"><i class="ri-building-2-line"></i> Obras</li>
            <li class="configuracoes-link"><i class="ri-settings-3-line"></i> Configurações</li>
          </ul>
        </nav>
      </div>
      <div class="user-profile">
        <div class="user-info">
          <div class="name">Usuário</div>
          <div class="email">usuario@email.com</div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <div class="header-content">
          <div class="header-icons">
            <i class="ri-notification-3-line"></i>
          </div>
        </div>
      </header>

      <section class="content-box">
        <div class="content-header">
          <h2>Empresas</h2>
          <div class="actions">
            <input type="text" placeholder="Pesquisar por nome" />
            <select>
              <option>Ativas</option>
              <option>Inativas</option>
            </select>
            <button class="btn primary" id="btnCadastrarEmpresa"><i class="ri-add-line"></i> Cadastrar Empresa</button>
            <button class="btn secondary" id="ParaObras"><i class="ri-building-2-line"></i> Ir para Obras</button>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Construtora</th>
              <th>Obras Relacionadas</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="empresa-lista">
            <!-- Empresas serão carregadas aqui -->
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <!-- Modal Cadastrar Construtora -->
  <div class="modal-overlay" id="modalConstrutora">
    <div class="modal">
      <button class="modal-close" onclick="fecharModal()">×</button>
      <h2>Cadastrar Construtora</h2>
      <form id="construtora-form">
        <div class="form-group">
          <label for="razao-social">Razão Social</label>
          <input type="text" id="razao-social" name="razao-social" />
        </div>
        <div class="form-group">
          <label for="nome-fantasia">Nome Fantasia</label>
          <input type="text" id="nome-fantasia" name="nome-fantasia" />
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" />
        </div>
        <div class="form-group">
          <label for="porte">Porte da Empresa</label>
          <select id="porte" name="porte">
            <option value="" disabled selected>Selecione</option>
            <option value="mei">MEI</option>
            <option value="epp">EPP</option>
            <option value="medio">Médio Porte</option>
            <option value="grande">Grande Porte</option>
          </select>
        </div>
        <div class="form-group">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" />
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="fecharModal()">Cancelar</button>
          <button id="construtora" type="submit" class="btn-primary">Cadastrar</button>
        </div>
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
      </form>
    </div>
  </div>

  <!-- Modal Editar Empresa -->
  <div class="modal-overlay" id="modalEditarEmpresa">
    <div class="modal">
      <button class="modal-close" onclick="fecharModalEditar()">×</button>
      <h2>Editar Empresa</h2>
      <form id="editar-empresa-form">
        <div class="form-group">
          <label for="edit-razao-social">Razão Social</label>
          <input type="text" id="edit-razao-social" required>
        </div>
        <div class="form-group">
          <label for="edit-nome-fantasia">Nome Fantasia</label>
          <input type="text" id="edit-nome-fantasia" required>
        </div>
        <div class="form-group">
          <label for="edit-email">E-mail</label>
          <input type="email" id="edit-email" required>
        </div>
        <div class="form-group">
          <label for="edit-porte">Porte da Empresa</label>
          <select id="edit-porte" required>
            <option value="" disabled selected>Selecione</option>
            <option value="Micro">Micro</option>
            <option value="Pequena">Pequena</option>
            <option value="Média">Média</option>
            <option value="Grande">Grande</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-telefone">Telefone</label>
          <input type="tel" id="edit-telefone" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="fecharModalEditar()">Cancelar</button>
          <button id="salvar-edicao" type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="../js/menuEmpresa.js"></script>
  <script type="module" src="../js/redirecionar.js"></script>

  <!-- Scripts extras para modais -->
  <script>
    // Abrir modal cadastrar
    const btnCadastrarEmpresa = document.getElementById('btnCadastrarEmpresa');
    const modalCadastrar = document.getElementById('modalConstrutora');

    btnCadastrarEmpresa.addEventListener('click', () => {
      modalCadastrar.style.display = 'flex';
    });

    function fecharModal() {
      modalCadastrar.style.display = 'none';
    }

    function fecharModalEditar() {
      document.getElementById('modalEditarEmpresa').style.display = 'none';
    }
  </script>
</body>
</html>
